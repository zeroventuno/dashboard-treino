<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800">
<style>
.body{fill:#151a20;stroke:#747b84;stroke-width:3}
.muscle{fill:#252b33;stroke:#69717b;stroke-width:2;transition:.2s;cursor:pointer}
.muscle:hover{fill:#ff9f32;stroke:#ffb04d;filter:drop-shadow(0 0 8px #ff9f32)}
</style>
<rect width="1000" height="800" fill="#101419"/>
